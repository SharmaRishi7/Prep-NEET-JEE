<!DOCTYPE html>
<html>
<head>
  <title>NEETFlow</title>

  <style>
    body{
      margin:0;
      font-family: 'Segoe UI', sans-serif;
      background:#0b1220;
      color:white;
    }

    header{
      padding:20px;
      text-align:center;
      font-size:26px;
      font-weight:700;
      background: linear-gradient(135deg,#16a34a,#22c55e);
    }

    .container{
      max-width:900px;
      margin:auto;
      padding:20px;
    }

    .quote{
      text-align:center;
      margin:15px 0;
      padding:12px;
      border-radius:12px;
      background:rgba(255,255,255,0.06);
      color:#a7f3d0;
      font-size:14px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
      gap:15px;
      margin-top:20px;
    }

    .card{
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.08);
      padding:20px;
      border-radius:14px;
      text-align:center;
      text-decoration:none;
      color:white;
      transition:0.2s;
    }

    .card:hover{
      transform:translateY(-5px);
      background:rgba(255,255,255,0.12);
    }

    .icon{
      font-size:28px;
      margin-bottom:10px;
    }

    .title{
      font-size:15px;
      font-weight:600;
    }

    .sub{
      font-size:12px;
      color:#94a3b8;
      margin-top:5px;
    }

    .panel{
      margin-top:20px;
      text-align:center;
    }

    .btn{
      padding:10px 14px;
      margin:5px;
      border:none;
      border-radius:10px;
      cursor:pointer;
      font-weight:600;
      background:#22c55e;
      color:white;
    }

    .btn:hover{
      opacity:0.9;
    }
  </style>
</head>

<body>

<header>NEETFlow ⚡</header>

<div class="container">

  <div class="quote">
    “Consistency is the key 🔑”
  </div>

  <div class="panel">
    <button class="btn">🔥 Start Practice</button>
    <button class="btn">📊 My Progress</button>
  </div>

  <div class="grid">

    <a class="card" href="#">
      <div class="icon">📘</div>
      <div class="title">Physics</div>
      <div class="sub">Mechanics • Electro</div>
    </a>

    <a class="card" href="#">
      <div class="icon">⚗️</div>
      <div class="title">Chemistry</div>
      <div class="sub">Organic • Inorganic</div>
    </a>

    <a class="card" href="#">
      <div class="icon">🧬</div>
      <div class="title">Biology</div>
      <div class="sub">Botany • Zoology</div>
    </a>

    <a class="card" href="#">
      <div class="icon">📊</div>
      <div class="title">Maths</div>
      <div class="sub">Algebra • Calculus</div>
    </a>

  </div>

</div>

</body>
</html>
