<!DOCTYPE html>
<html>
<head>
  <title>NEETFlow</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Segoe UI',sans-serif;
    }

    body{
      background:#0a0f1c;
      color:white;
    }

    header{
      padding:22px;
      text-align:center;
      font-size:26px;
      font-weight:800;
      background: linear-gradient(135deg,#16a34a,#22c55e);
      letter-spacing:1px;
    }

    .container{
      max-width:1000px;
      margin:auto;
      padding:20px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:18px;
      flex-wrap:wrap;
      gap:10px;
    }

    .quote{
      flex:1;
      padding:12px 14px;
      border-radius:12px;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.08);
      color:#a7f3d0;
      font-size:13px;
    }

    .streak{
      padding:10px 14px;
      border-radius:12px;
      background:rgba(34,197,94,0.15);
      border:1px solid #22c55e;
      font-weight:600;
      font-size:13px;
    }

    .actions{
      display:flex;
      gap:10px;
      margin:15px 0 25px;
    }

    .btn{
      flex:1;
      padding:12px;
      border:none;
      border-radius:12px;
      font-weight:600;
      cursor:pointer;
      color:white;
      background:#22c55e;
      transition:0.2s;
    }

    .btn:hover{
      transform:translateY(-2px);
      opacity:0.9;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
      gap:16px;
    }

    .card{
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.08);
      padding:20px;
      border-radius:16px;
      cursor:pointer;
      transition:0.25s;
      text-align:center;
    }

    .card:hover{
      transform:translateY(-6px);
      border-color:#22c55e;
      background:rgba(255,255,255,0.08);
    }

    .icon{
      font-size:30px;
      margin-bottom:10px;
    }

    .title{
      font-size:15px;
      font-weight:700;
    }

    .desc{
      font-size:12px;
      color:#94a3b8;
      margin-top:5px;
    }

    footer{
      text-align:center;
      margin-top:25px;
      font-size:12px;
      color:#64748b;
    }
  </style>
</head>

<body>

<header>NEETFlow ⚡</header>

<div class="container">

  <div class="topbar">
    <div class="quote" id="quote">“Consistency is the key 🔑”</div>
    <div class="streak" id="streak">🔥 Streak: 1 day</div>
  </div>

  <div class="actions">
    <button class="btn">Start Practice</button>
    <button class="btn">My Progress</button>
  </div>

  <div class="grid">

    <div class="card">
      <div class="icon">📘</div>
      <div class="title">Physics</div>
      <div class="desc">Mechanics • Electro • Modern</div>
    </div>

    <div class="card">
      <div class="icon">⚗️</div>
      <div class="title">Chemistry</div>
      <div class="desc">Organic • Inorganic • Physical</div>
    </div>

    <div class="card">
      <div class="icon">🧬</div>
      <div class="title">Biology</div>
      <div class="desc">Botany • Zoology • Genetics</div>
    </div>

    <div class="card">
      <div class="icon">📊</div>
      <div class="title">Maths</div>
      <div class="desc">Algebra • Calculus • Trigo</div>
    </div>

  </div>

  <footer>
    Built for NEET Aspirants 🚀
  </footer>

</div>

<script>
  // simple quote rotation
  const quotes = [
    "Consistency is the key 🔑",
    "Small daily effort = Big result 📈",
    "Discipline beats motivation 💪",
    "Focus builds rank 🎯"
  ];

  document.getElementById("quote").innerText =
    quotes[Math.floor(Math.random()*quotes.length)];

  // fake streak (simple for now)
  let streak = localStorage.getItem("streak") || 1;
  document.getElementById("streak").innerText = "🔥 Streak: " + streak + " day(s)";
</script>

</body>
</html>
